name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: jdx/mise-action@5083fe46b0db311f8a5a47dc7c97ab9c55a8fe87 # v2.1.11
      - run: npm ci
      - run: npx vitest run
      - run: npx biome check .
      - name: Publish GitHub Release
        run: gh release create ${{ github.ref_name }} --notes-from-tag --title "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
