name: Dependency Review

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    # Uses `npm audit` instead of actions/dependency-review-action because
    # the latter requires Dependency Graph + GitHub Advanced Security on
    # private repos. `npm audit` works on any repo, no admin config needed,
    # and checks the same npm advisory database. Socket Security (separate
    # workflow) provides orthogonal CVE coverage as a second layer.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
      - run: npm ci
      - name: npm audit (high severity blocks merge)
        run: npm audit --audit-level=high
