name: Dependency Review

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    # Uses `npm audit` instead of actions/dependency-review-action because
    # the latter requires Dependency Graph + GitHub Advanced Security on
    # private repos. `npm audit` works on any repo, no admin config needed,
    # and checks the same npm advisory database. Socket Security (separate
    # workflow) provides orthogonal CVE coverage as a second layer.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
      - run: npm ci
      - name: npm audit (production deps, high+ blocks merge)
        # Scope to production deps via --omit=dev so dev-only CVEs (currently
        # protobufjs/uuid transitive through deepeval, no upstream fix yet)
        # don't block PRs. The dev-dep CVEs are tracked in the audit backlog.
        # Production deps are the real attack surface for downstream users.
        run: npm audit --audit-level=high --omit=dev
