name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: ["24"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
      - run: npm ci
      - name: Lint
        run: npx biome check .
      - name: Test
        run: npx vitest run --reporter=verbose
      - name: Coverage
        run: npx vitest run --coverage
      - name: Behavioral Eval (DeepEval)
        # --passWithNoTests: evals/deepeval/ uses test_*.mjs (DeepEval naming)
        # which doesn't match vitest's *.test.mjs include; the real behavioral
        # gate runs via tools/eval_gate.mjs. Don't fail CI on the pattern gap.
        run: npx vitest run evals/deepeval/ --reporter=verbose --passWithNoTests
      - name: Fresh-shell smoke test
        run: node src/cli.mjs --version
      - name: Integration test
        run: node src/cli.mjs vein-launch --mode=fast --ci
