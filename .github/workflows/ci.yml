name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: jdx/mise-action@5083fe46b0db311f8a5a47dc7c97ab9c55a8fe87 # v2.1.11
      - run: npm ci
      - run: npx biome check .
        name: Lint
      - run: npx vitest run --reporter=verbose
        name: Test
      - run: npx vitest run --coverage
        name: Coverage
      - name: Eval
        if: success()
        run: npx promptfoo@latest eval -c evals/promptfooconfig.yaml --no-progress-bar
        continue-on-error: true
