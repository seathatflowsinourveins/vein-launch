name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: ["24"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: jdx/mise-action@5083fe46b0db311f8a5a47dc7c97ab9c55a8fe87 # v2.1.11
      - run: npm ci
      - name: Lint
        run: npx biome check .
      - name: Test
        run: npx vitest run --reporter=verbose
      - name: Coverage
        run: npx vitest run --coverage
      - name: Behavioral Eval (DeepEval)
        run: npx vitest run evals/deepeval/ --reporter=verbose
      - name: Fresh-shell smoke test
        run: node src/cli.mjs --version
      - name: Integration test
        run: node src/cli.mjs vein-launch --mode=fast --ci
