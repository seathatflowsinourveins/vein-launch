pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,mjs,json}"
      run: npx biome check --fix --staged {staged_files}
      stage_fixed: true
    gitleaks:
      run: gitleaks protect --staged --redact
      skip:
        - run: "! which gitleaks > /dev/null 2>&1"
    no-secrets:
      run: trufflehog filesystem --staged --fail
      skip:
        - run: "! which trufflehog > /dev/null 2>&1"

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    test:
      run: npx vitest run
    lint-full:
      run: npx biome check .
