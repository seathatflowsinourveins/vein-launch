# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# DEPRECATED — migrating to DeepEval. Remove after Wave 13.
description: "vein-launch behavioral precheck evaluation (Wave 11-B1)"

providers:
  - id: "exec:node src/orchestrator.mjs --eval-mode {{args}}"
    label: "vein-precheck"
    config:
      # Pass scenario args as a single positional substitution
      passthrough: true

prompts:
  - "{{args}}"

defaultTest:
  options:
    timeout: 30000
  assert:
    - type: javascript
      value: "file://evals/assertions/tier-report.js"

tests:
  # (a) Fast mode against current cwd — pass case
  - description: "Fast mode completes successfully and emits well-formed eval JSON"
    vars:
      args: "--mode=fast"
      mode: "fast"
      expectError: false
      expectedMinTiers: 1
    assert:
      - type: javascript
        value: "file://evals/assertions/tier-report.js"

  # (b) Deep mode against current cwd — pass case
  - description: "Deep mode completes successfully and emits well-formed eval JSON"
    vars:
      args: "--mode=deep"
      mode: "deep"
      expectError: false
      expectedMinTiers: 1
    assert:
      - type: javascript
        value: "file://evals/assertions/tier-report.js"

  # (c) Invalid mode flag — should exit non-zero with useful message
  - description: "Invalid --mode flag emits error JSON (not a silent crash)"
    vars:
      args: "--mode=invalid"
      expectError: true
    assert:
      - type: javascript
        value: "file://evals/assertions/tier-report.js"

  # (d) Nonexistent project arg — should fail gracefully with JSON error
  - description: "Nonexistent project path emits error JSON gracefully"
    vars:
      args: "/nonexistent/path/that/does/not/exist"
      expectError: false
      expectedMinTiers: 1
    assert:
      - type: javascript
        value: "file://evals/assertions/tier-report.js"

  # (e) Fast mode with --ci flag — should NOT launch Claude, still emit eval JSON
  - description: "Fast mode with --ci flag does not launch Claude and emits eval JSON"
    vars:
      args: "--mode=fast --ci"
      mode: "fast"
      expectError: false
      expectedMinTiers: 1
    assert:
      - type: javascript
        value: "file://evals/assertions/tier-report.js"
      # The --ci flag should not appear in the eval output schema
      - type: not-contains
        value: "launchClaude"
